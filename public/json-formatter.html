<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON格式化工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      height: { 'panel': 'calc(50vh - 5rem)', 'panel-lg': 'calc(100vh - 8rem)' }
    }
  }
}
</script>
<style type="text/tailwindcss">
  @layer utilities {
    .nowrap { white-space: pre; overflow-x: auto; word-wrap: normal; }
  }
</style>
<style>
/* 语法高亮 & 折叠 - 不适合用 Tailwind 的部分 */
#output-pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.hl-key { color: #9cdcfe; }
.hl-str { color: #d19a66; }
.hl-num { color: #e06c75; }
.hl-bool { color: #e06c75; }
.hl-null { color: #f44747; }
.fold-toggle { cursor: pointer; user-select: none; color: #888; display: inline-block; width: 1em; text-align: center; margin-left: -1.2em; }
.fold-toggle:hover { color: #3b82f6; }
.fold-content.collapsed { display: none; }
.fold-placeholder { display: none; cursor: pointer; color: #888; font-style: italic; }
.fold-placeholder.show { display: inline; }
.fold-placeholder:hover { color: #3b82f6; }
</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col p-3 md:p-5">

  <!-- 标题 -->
  <h1 class="text-center text-gray-800 text-lg md:text-xl font-semibold mb-2 shrink-0">
    <a href="/" class="text-gray-400 hover:text-blue-500 mr-1 text-sm">←</a>
    JSON 格式化工具
  </h1>

  <!-- 按钮栏 -->
  <div class="flex flex-wrap gap-2 justify-center mb-3 shrink-0">
    <button onclick="formatJSON()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm bg-blue-500 hover:bg-blue-600 text-white rounded transition-colors">
      格式化JSON</button>
    <button onclick="compressJSON()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm bg-blue-500 hover:bg-blue-600 text-white rounded transition-colors">
      压缩单行</button>
    <button onclick="unescapeOnly()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm bg-blue-500 hover:bg-blue-600 text-white rounded transition-colors">
      去除转义</button>
    <button onclick="unescapeAndFormat()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm bg-blue-500 hover:bg-blue-600 text-white rounded transition-colors">
      去转义+格式化</button>
    <button onclick="escapeText()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm bg-blue-500 hover:bg-blue-600 text-white rounded transition-colors">
      增加转义</button>
  </div>

  <!-- 主面板区域：移动端上下排列，桌面端左右排列 -->
  <div class="flex-1 flex flex-col lg:flex-row gap-3 min-h-0">

    <!-- 输入面板 -->
    <div class="flex-1 flex flex-col min-h-0">
      <div class="flex items-center justify-between mb-1 px-1">
        <label class="text-xs text-gray-500">输入</label>
        <span class="text-xs text-gray-400 cursor-pointer hover:text-blue-500 select-none"
              onclick="toggleWrap('input', this)">折行: 开</span>
      </div>
      <div class="relative flex-1 min-h-[30vh] lg:min-h-0">
        <textarea id="input"
          placeholder="在此输入JSON文本或纯文本..."
          class="absolute inset-0 w-full h-full p-3 font-mono text-xs md:text-sm leading-relaxed
                 border border-gray-300 rounded-lg resize-none outline-none bg-white
                 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"></textarea>
        <button onclick="pasteClipboard()"
          class="absolute bottom-2 right-2 px-3 py-1 text-xs border border-gray-300 bg-gray-100
                 text-gray-500 rounded hover:bg-gray-200 opacity-70 hover:opacity-100 transition-opacity z-10">
          粘贴</button>
      </div>
    </div>

    <!-- 输出面板 -->
    <div class="flex-1 flex flex-col min-h-0">
      <div class="flex items-center justify-between mb-1 px-1">
        <label class="text-xs text-gray-500">输出</label>
        <span class="text-xs text-gray-400 cursor-pointer hover:text-blue-500 select-none"
              onclick="toggleOutputWrap(this)">折行: 开</span>
      </div>
      <div class="relative flex-1 min-h-[30vh] lg:min-h-0">
        <div id="output-pre"
          class="absolute inset-0 w-full h-full p-3 text-xs md:text-sm leading-relaxed
                 whitespace-pre-wrap break-words overflow-auto rounded-lg
                 bg-[#1e1e1e] text-[#d4d4d4] border border-gray-300"></div>
        <button onclick="copyOutput()"
          class="absolute bottom-2 right-2 px-3 py-1 text-xs border border-gray-600 bg-[#2d2d2d]
                 text-gray-400 rounded hover:text-gray-200 opacity-70 hover:opacity-100 transition-opacity z-10">
          复制</button>
      </div>
    </div>
  </div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output-pre');
let rawOutput = '';

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleWrap(id, el) {
  const ta = document.getElementById(id);
  ta.classList.toggle('nowrap');
  el.textContent = ta.classList.contains('nowrap') ? '折行: 关' : '折行: 开';
}
function toggleOutputWrap(el) {
  outputEl.classList.toggle('nowrap');
  el.textContent = outputEl.classList.contains('nowrap') ? '折行: 关' : '折行: 开';
}

let foldId = 0;
function renderJsonHtml(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  const pad1 = '  '.repeat(indent + 1);
  if (obj === null) return '<span class="hl-null">null</span>';
  if (typeof obj === 'boolean') return '<span class="hl-bool">' + obj + '</span>';
  if (typeof obj === 'number') return '<span class="hl-num">' + obj + '</span>';
  if (typeof obj === 'string') return '<span class="hl-str">' + esc(JSON.stringify(obj)) + '</span>';
  const id = foldId++;
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    let lines = [];
    for (let i = 0; i < obj.length; i++) {
      lines.push(pad1 + renderJsonHtml(obj[i], indent + 1) + (i < obj.length - 1 ? ',' : ''));
    }
    const summary = esc('[/* ' + obj.length + ' items */]');
    return '<span class="fold-toggle" id="ft'+id+'" onclick="toggleFold('+id+')">▼</span>[' +
      '\n<span class="fold-content" id="fc'+id+'">' + lines.join('\n') + '\n' + pad + '</span>' +
      '<span class="fold-placeholder" id="fp'+id+'" onclick="toggleFold('+id+')">' + summary + '</span>]';
  }
  const keys = Object.keys(obj);
  if (keys.length === 0) return '{}';
  let lines = [];
  for (let i = 0; i < keys.length; i++) {
    const k = keys[i];
    lines.push(pad1 + '<span class="hl-key">' + esc(JSON.stringify(k)) + '</span>: ' + renderJsonHtml(obj[k], indent + 1) + (i < keys.length - 1 ? ',' : ''));
  }
  const summary = esc('{/* ' + keys.length + ' keys */}');
  return '<span class="fold-toggle" id="ft'+id+'" onclick="toggleFold('+id+')">▼</span>{' +
    '\n<span class="fold-content" id="fc'+id+'">' + lines.join('\n') + '\n' + pad + '</span>' +
    '<span class="fold-placeholder" id="fp'+id+'" onclick="toggleFold('+id+')">' + summary + '</span>}';
}

function toggleFold(id) {
  const content = document.getElementById('fc' + id);
  const ph = document.getElementById('fp' + id);
  const toggle = document.getElementById('ft' + id);
  const collapsed = content.classList.toggle('collapsed');
  ph.classList.toggle('show', collapsed);
  toggle.textContent = collapsed ? '▶' : '▼';
}

function highlightTokens(json) {
  const re = /"(?:\\.|[^"\\])*"\s*:|"(?:\\.|[^"\\])*"|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?|\btrue\b|\bfalse\b|\bnull\b|[{}\[\]:,]|\s+/g;
  const tokens = json.match(re);
  if (!tokens) return esc(json);
  let r = '';
  for (const t of tokens) {
    if (/^".*":\s*$/.test(t)) {
      const i = t.lastIndexOf(':');
      r += '<span class="hl-key">' + esc(t.slice(0, i)) + '</span>' + esc(t.slice(i));
    } else if (/^"/.test(t)) r += '<span class="hl-str">' + esc(t) + '</span>';
    else if (/^-?\d/.test(t)) r += '<span class="hl-num">' + esc(t) + '</span>';
    else if (t === 'true' || t === 'false') r += '<span class="hl-bool">' + t + '</span>';
    else if (t === 'null') r += '<span class="hl-null">null</span>';
    else r += esc(t);
  }
  return r;
}

function setOutput(text, isJson, parsed) {
  rawOutput = text;
  if (isJson && parsed !== undefined) { foldId = 0; outputEl.innerHTML = renderJsonHtml(parsed, 0); }
  else if (isJson) { outputEl.innerHTML = highlightTokens(text); }
  else { outputEl.innerHTML = esc(text); }
}

function formatJSON() {
  try {
    const obj = JSON.parse(inputEl.value);
    setOutput(JSON.stringify(obj, null, 2), true, obj);
  } catch(e) {
    const result = tokenFormat(inputEl.value);
    if (result) { setOutput(result, false); outputEl.innerHTML = highlightTokens(result); }
    else { setOutput('错误: 输入不是合法的JSON\n' + e.message, false); }
  }
}

function tokenFormat(text) {
  const re = /"(?:\\.|[^"\\])*"|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?|\btrue\b|\bfalse\b|\bnull\b|[{}\[\]:,]/g;
  const tokens = text.match(re);
  if (!tokens) return null;
  let r = '', indent = 0;
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    if (t === '}' || t === ']') { indent--; r += '\n' + '  '.repeat(indent) + t; }
    else if (t === '{' || t === '[') { r += t + '\n'; indent++; r += '  '.repeat(indent); }
    else if (t === ',') { r += ',\n' + '  '.repeat(indent); }
    else if (t === ':') { r += ': '; }
    else { r += t; }
  }
  return r;
}

function compressJSON() {
  try { const obj = JSON.parse(inputEl.value); setOutput(JSON.stringify(obj), true); }
  catch(e) { setOutput('错误: 输入不是合法的JSON\n' + e.message, false); }
}

function simpleUnescape(s) {
  return s.replace(/\\(n|r|t|"|\\)/g, function(_, c) {
    if (c === 'n') return '\n'; if (c === 'r') return '\r';
    if (c === 't') return '\t'; if (c === '"') return '"';
    if (c === '\\') return '\\'; return c;
  });
}
function doUnescape(text) {
  if (text.startsWith('"') && text.endsWith('"')) {
    try { return JSON.parse(text); } catch(e) { return simpleUnescape(text); }
  }
  return simpleUnescape(text);
}

function unescapeOnly() { setOutput(doUnescape(inputEl.value), false); }
function unescapeAndFormat() {
  let text = doUnescape(inputEl.value);
  try { const obj = JSON.parse(text); setOutput(JSON.stringify(obj, null, 2), true, obj); }
  catch(e) { setOutput(text, false); }
}
function escapeText() {
  let text = inputEl.value;
  try { text = JSON.stringify(JSON.parse(text)); } catch(e) {}
  setOutput(text.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t'), false);
}

function copyOutput() {
  navigator.clipboard.writeText(rawOutput).then(() => {
    const btn = document.querySelector('[onclick="copyOutput()"]');
    btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1500);
  });
}
function pasteClipboard() {
  navigator.clipboard.readText().then(text => { inputEl.value = text; });
}
</script>
</body>
</html>
